# pre-commit hook configuration
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: terraform-fmt
        name: Terraform format check
        entry: terraform fmt -check -recursive -diff
        language: system
        files: \.tf$
        pass_filenames: false

      - id: tflint
        name: TFLint
        entry: bash -c 'cd terraform && tflint'
        language: system
        files: \.tf$
        pass_filenames: false

      - id: ansible-lint
        name: Ansible lint
        entry: bash -c 'ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint ansible/playbooks/'
        language: system
        files: \.(yml|yaml)$
        pass_filenames: false
