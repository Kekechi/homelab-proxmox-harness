[defaults]
inventory           = inventory/
roles_path          = roles/
collections_paths   = ~/.ansible/collections
remote_user         = ansible
private_key_file    = /workspace/.ssh/id_ed25519
host_key_checking   = True
retry_files_enabled = False
stdout_callback     = yaml

[privilege_escalation]
become        = True
become_method = sudo

[ssh_connection]
pipelining = True
# SSH via Squid CONNECT tunnel (port 22 is allowed to sandbox CIDR only)
# ncat must be installed in the devcontainer (see Dockerfile)
ssh_args = -o ProxyCommand="ncat --proxy squid-proxy:3128 --proxy-type http %h %p" -o StrictHostKeyChecking=accept-new
