---
# nexus-setup.yml — Deploy Sonatype Nexus Repository CE
#
# Nexus serves as the homelab artifact server: APT packages, Docker images,
# Terraform providers. nginx terminates TLS on the same LXC; step-ca issues the cert.
#
# Required env vars (set in .envrc, then run: direnv allow):
#   NEXUS_ADMIN_PASSWORD         — desired admin password after bootstrap
#   STEP_CA_PROVISIONER_PASSWORD — JWK provisioner password for cert issuance
#
# Required variables (set in group_vars or passed via -e):
#   nexus_domain                 — FQDN for TLS cert and nginx server_name
#
# Usage:
#   ansible-playbook ansible/playbooks/nexus-setup.yml

- name: Common setup for Nexus host
  hosts: nexus
  become: true
  pre_tasks:
    # Nexus is its own APT proxy — it must not depend on itself for the packages
    # needed to deploy itself (circular dependency). Direct upstream avoids this
    # for all stages: first install, TLS deployment, and re-runs. The step_client
    # role in Play 3 is overridden (nexus_apt_proxy: "") to stay consistent.
    - name: Pin smallstep APT sources to direct upstream on Nexus host
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/smallstep.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: https://packages.smallstep.com/stable/debian
          Suites: debs
          Components: main
          Signed-By: /etc/apt/keyrings/smallstep.asc
  roles:
    - common

- name: Deploy Nexus Repository CE
  hosts: nexus
  become: true
  roles:
    - nexus

- name: Deploy step CLI client (direct upstream — Nexus must not proxy its own deps)
  hosts: nexus
  become: true
  roles:
    - role: step_client
      vars:
        nexus_apt_proxy: ""  # noqa: var-naming — shared infra var, not step_client-specific
