---
# distribute-root-cert.yml — Trust the internal Root CA on all managed hosts
#
# Copies the root CA certificate (fetched to the controller during pki-setup.yml)
# to /usr/local/share/ca-certificates/ and runs update-ca-certificates.
#
# Run this playbook after pki-setup.yml completes successfully:
#   ansible-playbook ansible/playbooks/distribute-root-cert.yml --limit <group_or_host>
#
# WARNING: This playbook targets `hosts: all`. Always use --limit to avoid pushing
# the root cert to unintended hosts when production hosts are also in the inventory.
# Example: --limit sandbox   (restrict to sandbox group)
#          --limit minio      (only the MinIO server)
#
# The root CA cert must already be present at {{ step_ca_controller_staging_dir }}/root_ca.crt on
# the Ansible controller (it is placed there by the step_ca_root role).

- name: Distribute internal Root CA certificate to all managed hosts
  hosts: all
  become: true

  tasks:
    - name: Check that root CA cert is present on controller
      ansible.builtin.stat:
        path: "{{ step_ca_controller_staging_dir }}/root_ca.crt"
      delegate_to: localhost
      register: _root_ca_cert
      become: false

    - name: Fail if root CA cert is not available on controller
      ansible.builtin.fail:
        msg: >
          {{ step_ca_controller_staging_dir }}/root_ca.crt not found on the Ansible controller.
          Run pki-setup.yml first to generate and fetch the root CA certificate.
      when: not _root_ca_cert.stat.exists

    - name: Copy internal Root CA certificate to system trust store
      ansible.builtin.copy:
        src: "{{ step_ca_controller_staging_dir }}/root_ca.crt"
        dest: /usr/local/share/ca-certificates/internal-root-ca.crt
        owner: root
        group: root
        mode: "0644"
      notify: Update CA certificates

  handlers:
    - name: Update CA certificates
      ansible.builtin.command:
        cmd: update-ca-certificates
      changed_when: true
