---
# pki-setup.yml — Deploy two-tier internal PKI (step-ca)
#
# IMPORTANT: The root CA VM must be POWERED ON before running this playbook.
# After the playbook completes successfully, shut down the root CA VM to keep
# the root key offline. The issuing CA LXC runs continuously.
#
# Required env vars (set in .envrc, then run: direnv allow):
#   STEP_CA_ROOT_PASSWORD        — encrypts/decrypts the root CA private key
#   STEP_CA_ISSUING_PASSWORD     — encrypts the new intermediate CA private key
#   STEP_CA_PROVISIONER_PASSWORD — encrypts the JWK ACME provisioner key
#
# Required group_vars:
#   group_vars/pki_root_ca/vars.yml   — step_ca_root_ca_name
#   group_vars/pki_issuing_ca/vars.yml — step_ca_issuing_ca_name, step_ca_issuing_ca_dns,
#                                        step_ca_issuing_ca_address
#
# Usage:
#   ansible-playbook ansible/playbooks/pki-setup.yml

- name: Common baseline — APT credentials and base packages
  hosts: pki_root_ca:pki_issuing_ca
  become: true
  roles:
    - common

- name: Common setup — install step packages and create step user
  hosts: pki_root_ca:pki_issuing_ca
  become: true
  roles:
    - step_ca_common

- name: Root CA — generate root certificate and key
  hosts: pki_root_ca
  become: true
  roles:
    - step_ca_root

- name: Issuing CA — initialize step-ca and start service
  hosts: pki_issuing_ca
  become: true
  roles:
    - step_ca_issuing
