- name: Create Docker hosted repo
  ansible.builtin.include_tasks: _create_repo.yml
  vars:
    repo_name: docker-hosted
    repo_type: docker/hosted
    repo_body:
      name: docker-hosted
      online: true
      storage:
        blobStoreName: default
        strictContentTypeValidation: true
        writePolicy: allow
      docker:
        v1Enabled: false
        forceBasicAuth: true

- name: Create Docker proxy repo
  ansible.builtin.include_tasks: _create_repo.yml
  vars:
    repo_name: docker-proxy
    repo_type: docker/proxy
    repo_body:
      name: docker-proxy
      online: true
      storage:
        blobStoreName: default
        strictContentTypeValidation: true
      proxy:
        remoteUrl: "https://registry-1.docker.io"
        contentMaxAge: 1440
        metadataMaxAge: 1440
      negativeCache:
        enabled: true
        timeToLive: 1440
      httpClient:
        blocked: false
        autoBlock: true
      docker:
        v1Enabled: true
        forceBasicAuth: true
      dockerProxy:
        indexType: "HUB"

- name: Create Docker group repo
  ansible.builtin.include_tasks: _create_repo.yml
  vars:
    repo_name: docker-group
    repo_type: docker/group
    repo_body:
      name: docker-group
      online: true
      storage:
        blobStoreName: default
        strictContentTypeValidation: true
      group:
        memberNames:
          - docker-hosted
          - docker-proxy
      docker:
        v1Enabled: false
        forceBasicAuth: true
        httpPort: 5001

- name: Create Terraform proxy repo
