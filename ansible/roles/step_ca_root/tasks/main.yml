---
# step_ca_root — generate a self-signed root CA certificate and key.
#
# Prerequisites:
#   - step_ca_common role has been applied (step-cli binary is installed)
#   - STEP_CA_ROOT_PASSWORD env var is set in .envrc on the Ansible controller
#
# Variables (define in group_vars/pki_root_ca/vars.yml):
#   step_ca_root_ca_name          — CN for the root certificate, e.g. "Homelab Root CA"
#   step_ca_controller_staging_dir — controller-local staging directory for PKI material

- name: Assert required variables are defined
  ansible.builtin.assert:
    that:
      - step_ca_root_ca_name is defined and step_ca_root_ca_name | length > 0
      - step_ca_controller_staging_dir is defined and step_ca_controller_staging_dir | length > 0
    fail_msg: "step_ca_root_ca_name and step_ca_controller_staging_dir must be defined"

- name: Assert STEP_CA_ROOT_PASSWORD env var is set
  ansible.builtin.assert:
    that:
      - lookup('env', 'STEP_CA_ROOT_PASSWORD') | length > 0
    fail_msg: >
      STEP_CA_ROOT_PASSWORD is not set.
      Add it to .envrc and run: direnv allow

- name: Check if root CA certificate already exists
  ansible.builtin.stat:
    path: "{{ step_ca_home }}/certs/root_ca.crt"
  register: step_ca_root_cert_stat

- name: Generate root CA certificate and key
  when: not step_ca_root_cert_stat.stat.exists
  block:
    - name: Create temp file for root CA password
      ansible.builtin.tempfile:
        state: file
        suffix: .pw
      register: step_ca_root_pw_tmpfile

    - name: Write root CA password to temp file
      ansible.builtin.copy:
        content: "{{ lookup('env', 'STEP_CA_ROOT_PASSWORD') }}"
        dest: "{{ step_ca_root_pw_tmpfile.path }}"
        mode: "0600"
      no_log: true

    - name: Generate root CA certificate and key
      ansible.builtin.command:
        cmd: >-
          step certificate create
          "{{ step_ca_root_ca_name }}"
          {{ step_ca_home }}/certs/root_ca.crt
          {{ step_ca_home }}/secrets/root_ca.key
          --profile root-ca
          --not-after {{ step_ca_root_cert_duration }}
          --password-file {{ step_ca_root_pw_tmpfile.path }}
      environment:
        STEPPATH: "{{ step_ca_home }}"
      changed_when: true

    - name: Fix ownership of step-ca data directory after cert generation
      ansible.builtin.file:
        path: "{{ step_ca_home }}"
        owner: "{{ step_ca_user }}"
        group: "{{ step_ca_group }}"
        recurse: true

  always:
    - name: Remove root CA password temp file
      ansible.builtin.file:
        path: "{{ step_ca_root_pw_tmpfile.path }}"
        state: absent
      when: step_ca_root_pw_tmpfile.path is defined

- name: Ensure controller staging directory exists
  ansible.builtin.file:
    path: "{{ step_ca_controller_staging_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false

- name: Check if issuing CA has been initialized
  ansible.builtin.stat:
    path: "{{ step_ca_home }}/authorities/{{ step_ca_issuing_context }}/config/ca.json"
  register: step_ca_issuing_init_stat
  delegate_to: "{{ groups['pki_issuing_ca'][0] }}"

- name: Fetch root CA certificate to controller staging directory
  ansible.builtin.fetch:
    src: "{{ step_ca_home }}/certs/root_ca.crt"
    dest: "{{ step_ca_controller_staging_dir }}/root_ca.crt"
    flat: true

- name: Fetch root CA key to controller staging directory
  ansible.builtin.fetch:
    src: "{{ step_ca_home }}/secrets/root_ca.key"
    dest: "{{ step_ca_controller_staging_dir }}/root_ca.key"
    flat: true
  when: not step_ca_root_cert_stat.stat.exists or not step_ca_issuing_init_stat.stat.exists
