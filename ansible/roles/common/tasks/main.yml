---
- name: Configure apt to use Nexus proxy for base Debian repos
  when:
    - nexus_apt_proxy | default('') | length > 0
    - inventory_hostname not in groups['nexus'] | default([])
  block:
    - name: Deploy Nexus-proxied Debian sources (DEB822)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/debian-nexus.sources
        owner: root
        group: root
        mode: "0644"
        content: |
          Types: deb
          URIs: {{ nexus_apt_proxy }}/repository/apt-proxy-trixie/
          Suites: trixie
          Components: main contrib non-free non-free-firmware
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

          Types: deb
          URIs: {{ nexus_apt_proxy }}/repository/apt-proxy-trixie-updates/
          Suites: trixie-updates
          Components: main contrib non-free non-free-firmware
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

          Types: deb
          URIs: {{ nexus_apt_proxy }}/repository/apt-proxy-trixie-security/
          Suites: trixie-security
          Components: main contrib non-free non-free-firmware
          Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

    - name: Remove default Debian apt sources when using Nexus proxy
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list
        - /etc/apt/sources.list.d/debian.sources

- name: Configure Nexus APT credentials
  ansible.builtin.copy:
    dest: /etc/apt/auth.conf.d/nexus.conf
    owner: root
    group: root
    mode: "0600"
    content: |
      machine {{ nexus_apt_proxy }} login nexus-reader password {{ lookup('env', 'NEXUS_READER_PASSWORD') }}
  when:
    - nexus_apt_proxy | default('') | length > 0
    - lookup('env', 'NEXUS_READER_PASSWORD') | length > 0

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - vim
      - htop
      - ca-certificates
      - gnupg
      - python3
      - python3-pip
    state: present

- name: Check if internal root CA cert exists on controller
  ansible.builtin.stat:
    path: "{{ common_root_ca_controller_path }}"
  delegate_to: localhost
  become: false
  register: common_root_ca_cert_stat

- name: Warn if internal root CA cert is not available
  ansible.builtin.debug:
    msg: >-
      {{ common_root_ca_controller_path }} not found on the Ansible controller.
      Skipping internal root CA trust setup. Run pki-setup.yml first.
  when: not common_root_ca_cert_stat.stat.exists

- name: Copy internal root CA certificate to system trust store
  ansible.builtin.copy:
    src: "{{ common_root_ca_controller_path }}"
    dest: /usr/local/share/ca-certificates/internal-root-ca.crt
    owner: root
    group: root
    mode: "0644"
  when:
    - ansible_os_family == 'Debian'
    - common_root_ca_cert_stat.stat.exists
  notify: Update CA certificates

- name: Remove internal root CA from trust store when cert is absent on controller
  ansible.builtin.file:
    path: /usr/local/share/ca-certificates/internal-root-ca.crt
    state: absent
  when:
    - ansible_os_family == 'Debian'
    - not common_root_ca_cert_stat.stat.exists
  notify: Update CA certificates

- name: Set timezone
  community.general.timezone:
    name: "{{ common_timezone | default('UTC') }}"

- name: Disable root SSH password login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin prohibit-password'
    state: present
  notify: Restart sshd
