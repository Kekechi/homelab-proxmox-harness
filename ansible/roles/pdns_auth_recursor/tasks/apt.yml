---
- name: Install ca-certificates
  ansible.builtin.apt:
    name: ca-certificates
    state: present
    update_cache: true

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy PowerDNS APT signing key
  ansible.builtin.copy:
    src: pdns.asc
    dest: "{{ pdns_auth_recursor_apt_key_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Add PowerDNS Auth 5.0 APT repository (direct)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pdns-auth-50.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://repo.powerdns.com/debian
      Suites: trixie-auth-50
      Components: main
      Signed-By: /etc/apt/keyrings/pdns.asc
  when: nexus_apt_proxy | default('') | length == 0

- name: Add PowerDNS Auth 5.0 APT repository (via Nexus proxy)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pdns-auth-50.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: {{ nexus_apt_proxy }}/repository/apt-proxy-powerdns-auth-50/
      Suites: trixie-auth-50
      Components: main
      Signed-By: /etc/apt/keyrings/pdns.asc
  when: nexus_apt_proxy | default('') | length > 0

- name: Add PowerDNS Recursor 5.4 APT repository (direct)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pdns-rec-54.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://repo.powerdns.com/debian
      Suites: trixie-rec-54
      Components: main
      Signed-By: /etc/apt/keyrings/pdns.asc
  when: nexus_apt_proxy | default('') | length == 0

- name: Add PowerDNS Recursor 5.4 APT repository (via Nexus proxy)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pdns-rec-54.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: {{ nexus_apt_proxy }}/repository/apt-proxy-powerdns-rec-54/
      Suites: trixie-rec-54
      Components: main
      Signed-By: /etc/apt/keyrings/pdns.asc
  when: nexus_apt_proxy | default('') | length > 0

- name: Write APT pin to prefer PowerDNS packages from vendor repo
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/pdns
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: pdns-*
      Pin: version 5.*
      Pin-Priority: 600

- name: Install PowerDNS packages
  ansible.builtin.apt:
    name:
      - pdns-server
      - pdns-backend-sqlite3
      - pdns-recursor
      - dnsutils
      - sqlite3
    state: present
    update_cache: true
