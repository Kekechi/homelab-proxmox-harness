---
- name: Install ca-certificates
  ansible.builtin.apt:
    name: ca-certificates
    state: present
    update_cache: true

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy DNSdist APT signing key
  ansible.builtin.copy:
    src: dnsdist-21-pub.asc
    dest: "{{ pdns_dnsdist_apt_key_path }}"
    owner: root
    group: root
    mode: "0644"

- name: Add DNSdist 2.1 APT repository (direct)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/dnsdist-21.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://repo.powerdns.com/debian
      Suites: trixie-dnsdist-21
      Components: main
      Signed-By: /etc/apt/keyrings/dnsdist-21-pub.asc
  when: nexus_apt_proxy | default('') | length == 0

- name: Add DNSdist 2.1 APT repository (via Nexus proxy)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/dnsdist-21.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: {{ nexus_apt_proxy }}/repository/apt-proxy-dnsdist-21/
      Suites: trixie-dnsdist-21
      Components: main
      Signed-By: /etc/apt/keyrings/dnsdist-21-pub.asc
  when: nexus_apt_proxy | default('') | length > 0

- name: Write APT pin to prefer DNSdist package from vendor repo
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/dnsdist
    owner: root
    group: root
    mode: "0644"
    content: |
      Package: dnsdist
      Pin: origin repo.powerdns.com
      Pin-Priority: 600
  when: nexus_apt_proxy | default('') | length == 0

- name: Install DNSdist packages
  ansible.builtin.apt:
    name:
      - dnsdist
      - dnsutils
    state: present
    update_cache: true
