---
# step_ca_issuing — initialize step-ca on the always-on Issuing CA LXC.
#
# Prerequisites:
#   - step_ca_common role has been applied (step-cli and step-ca binaries are installed)
#   - step_ca_root role has run and fetched root_ca.crt + root_ca.key to the staging dir
#   - STEP_CA_ROOT_PASSWORD, STEP_CA_ISSUING_PASSWORD, STEP_CA_PROVISIONER_PASSWORD
#     env vars are set in .envrc on the Ansible controller
#
# Variables (define in group_vars/pki_issuing_ca/vars.yml):
#   step_ca_issuing_ca_name        — CN for the issuing CA, e.g. "Homelab Issuing CA"
#   step_ca_issuing_ca_dns         — DNS name for the CA, e.g. "ca.sandbox.example.com"
#   step_ca_issuing_ca_address     — listen address, e.g. ":443"
#   step_ca_controller_staging_dir — controller-local staging directory for PKI material

- name: Assert required variables are defined
  ansible.builtin.assert:
    that:
      - step_ca_issuing_ca_name is defined and step_ca_issuing_ca_name | length > 0
      - step_ca_issuing_ca_dns is defined and step_ca_issuing_ca_dns | length > 0
      - step_ca_issuing_ca_address is defined and step_ca_issuing_ca_address | length > 0
      - step_ca_controller_staging_dir is defined and step_ca_controller_staging_dir | length > 0
      - domain_name is defined and domain_name | length > 0
    fail_msg: >
      step_ca_issuing_ca_name, step_ca_issuing_ca_dns, step_ca_issuing_ca_address,
      step_ca_controller_staging_dir, and domain_name must all be defined

- name: Assert all required env vars are set
  ansible.builtin.assert:
    that:
      - lookup('env', 'STEP_CA_ROOT_PASSWORD') | length > 0
      - lookup('env', 'STEP_CA_ISSUING_PASSWORD') | length > 0
      - lookup('env', 'STEP_CA_PROVISIONER_PASSWORD') | length > 0
    fail_msg: >
      STEP_CA_ROOT_PASSWORD, STEP_CA_ISSUING_PASSWORD, and STEP_CA_PROVISIONER_PASSWORD
      must all be set in .envrc. Run: direnv allow

- name: Copy root CA certificate from staging to issuing CA
  ansible.builtin.copy:
    src: "{{ step_ca_controller_staging_dir }}/root_ca.crt"
    dest: "{{ step_ca_home }}/certs/root_ca.crt"
    owner: "{{ step_ca_user }}"
    group: "{{ step_ca_group }}"
    mode: "0644"

- name: Check if ca.json already exists
  ansible.builtin.stat:
    path: "{{ step_ca_home }}/authorities/{{ step_ca_issuing_context }}/config/ca.json"
  register: step_ca_issuing_ca_json_stat

- name: Initialize issuing CA with step ca init
  when: not step_ca_issuing_ca_json_stat.stat.exists
  block:
    - name: Create temp file for root key
      ansible.builtin.tempfile:
        state: file
        suffix: .key
      register: step_ca_issuing_root_key_tmpfile

    - name: Create temp file for root CA password
      ansible.builtin.tempfile:
        state: file
        suffix: .pw
      register: step_ca_issuing_root_pw_tmpfile

    - name: Create temp file for issuing CA password
      ansible.builtin.tempfile:
        state: file
        suffix: .pw
      register: step_ca_issuing_pw_tmpfile

    - name: Create temp file for provisioner password
      ansible.builtin.tempfile:
        state: file
        suffix: .pw
      register: step_ca_issuing_prov_pw_tmpfile

    - name: Copy root CA key from staging to temp file
      ansible.builtin.copy:
        src: "{{ step_ca_controller_staging_dir }}/root_ca.key"
        dest: "{{ step_ca_issuing_root_key_tmpfile.path }}"
        mode: "0600"
      no_log: true

    - name: Write root CA password to temp file
      ansible.builtin.copy:
        content: "{{ lookup('env', 'STEP_CA_ROOT_PASSWORD') }}"
        dest: "{{ step_ca_issuing_root_pw_tmpfile.path }}"
        mode: "0600"
      no_log: true

    - name: Write issuing CA password to temp file
      ansible.builtin.copy:
        content: "{{ lookup('env', 'STEP_CA_ISSUING_PASSWORD') }}"
        dest: "{{ step_ca_issuing_pw_tmpfile.path }}"
        mode: "0600"
      no_log: true

    - name: Write provisioner password to temp file
      ansible.builtin.copy:
        content: "{{ lookup('env', 'STEP_CA_PROVISIONER_PASSWORD') }}"
        dest: "{{ step_ca_issuing_prov_pw_tmpfile.path }}"
        mode: "0600"
      no_log: true

    - name: Run step ca init
      ansible.builtin.command:
        cmd: >-
          step ca init
          --name "{{ step_ca_issuing_ca_name }}"
          --dns "{{ step_ca_issuing_ca_dns }}"
          --address "{{ step_ca_issuing_ca_address }}"
          --provisioner "{{ step_ca_acme_provisioner_name }}"
          --password-file {{ step_ca_issuing_pw_tmpfile.path }}
          --provisioner-password-file {{ step_ca_issuing_prov_pw_tmpfile.path }}
          --deployment-type standalone
          --acme
          --context {{ step_ca_issuing_context }}
          --root {{ step_ca_home }}/certs/root_ca.crt
          --key {{ step_ca_issuing_root_key_tmpfile.path }}
          --key-password-file {{ step_ca_issuing_root_pw_tmpfile.path }}
      environment:
        STEPPATH: "{{ step_ca_home }}"
      changed_when: true

    - name: Fix ownership of step-ca data directory after init
      ansible.builtin.file:
        path: "{{ step_ca_home }}"
        owner: "{{ step_ca_user }}"
        group: "{{ step_ca_group }}"
        recurse: true

    - name: Write issuing CA password for step-ca service
      ansible.builtin.copy:
        content: "{{ lookup('env', 'STEP_CA_ISSUING_PASSWORD') }}"
        dest: "{{ step_ca_home }}/authorities/{{ step_ca_issuing_context }}/secrets/ca-password"
        owner: "{{ step_ca_user }}"
        group: "{{ step_ca_group }}"
        mode: "0600"
      no_log: true

  always:
    - name: Delete root key temp file
      ansible.builtin.file:
        path: "{{ step_ca_issuing_root_key_tmpfile.path }}"
        state: absent
      when: step_ca_issuing_root_key_tmpfile.path is defined

    - name: Delete root password temp file
      ansible.builtin.file:
        path: "{{ step_ca_issuing_root_pw_tmpfile.path }}"
        state: absent
      when: step_ca_issuing_root_pw_tmpfile.path is defined

    - name: Delete issuing CA password temp file
      ansible.builtin.file:
        path: "{{ step_ca_issuing_pw_tmpfile.path }}"
        state: absent
      when: step_ca_issuing_pw_tmpfile.path is defined

    - name: Delete provisioner password temp file
      ansible.builtin.file:
        path: "{{ step_ca_issuing_prov_pw_tmpfile.path }}"
        state: absent
      when: step_ca_issuing_prov_pw_tmpfile.path is defined

    - name: Delete root CA key from issuing CA host (if it landed at permanent path)
      ansible.builtin.file:
        path: "{{ step_ca_home }}/secrets/root_ca.key"
        state: absent

    - name: Delete root CA key from controller staging directory
      ansible.builtin.file:
        path: "{{ step_ca_controller_staging_dir }}/root_ca.key"
        state: absent
      delegate_to: localhost
      become: false

# Run setcap explicitly before starting service to ensure port 443 binding works.
# This must run as root (no become_user). Not using AmbientCapabilities in the
# systemd unit because Proxmox LXC seccomp filters block it.
- name: Get current capabilities on step-ca binary
  ansible.builtin.command:
    cmd: getcap /usr/bin/step-ca
  register: step_ca_getcap
  changed_when: false

- name: Set cap_net_bind_service on step-ca binary
  ansible.builtin.command:
    cmd: setcap cap_net_bind_service=ep /usr/bin/step-ca
  changed_when: "'cap_net_bind_service' not in step_ca_getcap.stdout"
  when: "'cap_net_bind_service' not in step_ca_getcap.stdout"

- name: Deploy step-ca systemd unit
  ansible.builtin.template:
    src: step-ca.service.j2
    dest: /etc/systemd/system/step-ca.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd and restart step-ca

- name: Enable and start step-ca service
  ansible.builtin.systemd:
    name: step-ca
    enabled: true
    state: started
    daemon_reload: true

# --- ACME domain policy ---

- name: Read current ca.json
  ansible.builtin.slurp:
    src: "{{ step_ca_home }}/authorities/{{ step_ca_issuing_context }}/config/ca.json"
  register: step_ca_issuing_ca_json_raw
  when: step_ca_issuing_ca_json_stat.stat.exists

- name: Set ca.json as parsed fact
  ansible.builtin.set_fact:
    step_ca_issuing_ca_json: "{{ step_ca_issuing_ca_json_raw.content | b64decode | from_json }}"
  when: step_ca_issuing_ca_json_stat.stat.exists

- name: Patch authority policy into ca.json
  when:
    - step_ca_issuing_ca_json_stat.stat.exists
    - step_ca_issuing_ca_json.authority.policy is not defined
      or ('*.' + domain_name) not in (step_ca_issuing_ca_json.authority.policy.x509.allow.dns | default([]))
  block:
    - name: Backup ca.json before policy patch
      ansible.builtin.copy:
        src: "{{ step_ca_home }}/authorities/{{ step_ca_issuing_context }}/config/ca.json"
        dest: "{{ step_ca_home }}/authorities/{{ step_ca_issuing_context }}/config/ca.json.bak"
        remote_src: true
        owner: "{{ step_ca_user }}"
        group: "{{ step_ca_group }}"
        mode: "0600"

    - name: Build desired authority policy
      ansible.builtin.set_fact:
        step_ca_issuing_desired_policy:
          x509:
            allow:
              dns:
                - "*.{{ domain_name }}"
            allowWildcardNames: true

    - name: Write ca.json with authority policy
      ansible.builtin.copy:
        content: >-
          {{
            step_ca_issuing_ca_json
            | combine({"authority": {"policy": step_ca_issuing_desired_policy}}, recursive=true)
            | to_nice_json
          }}
        dest: "{{ step_ca_home }}/authorities/{{ step_ca_issuing_context }}/config/ca.json"
        owner: "{{ step_ca_user }}"
        group: "{{ step_ca_group }}"
        mode: "0600"
      notify: Reload step-ca config

    - name: Verify step-ca health after policy patch
      ansible.builtin.uri:
        url: "https://{{ step_ca_issuing_ca_dns }}/health"
        validate_certs: false
        return_content: true
      register: step_ca_issuing_health
      retries: 3
      delay: 5
      until: step_ca_issuing_health.json.status == "ok"
