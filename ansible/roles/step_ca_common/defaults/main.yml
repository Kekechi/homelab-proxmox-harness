---
# Shared variables (step_ca_user, step_ca_group, step_ca_home) are defined in
# group_vars/all/step_ca.yml and are authoritative for all PKI roles.

# step ca init --context creates files under $STEPPATH/authorities/<context>/.
# This default is used across all PKI roles so that the root CA play can check
# the issuing CA init state via delegate_to without needing pki_issuing_ca vars.
step_ca_issuing_context: issuing-ca
