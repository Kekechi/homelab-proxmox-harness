---
# step_ca_common — install step-cli (and step-ca on issuing CA) via Smallstep APT repo,
# create system user, and create directory structure.
# Applied to both the Root CA VM and the Issuing CA LXC.

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
    state: present
    update_cache: true

- name: Ensure /etc/apt/keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy Smallstep APT signing key
  ansible.builtin.copy:
    src: smallstep.asc
    dest: /etc/apt/keyrings/smallstep.asc
    owner: root
    group: root
    mode: "0644"

- name: Add Smallstep APT repository (direct)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/smallstep.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://packages.smallstep.com/stable/debian
      Suites: debs
      Components: main
      Signed-By: /etc/apt/keyrings/smallstep.asc
  when: nexus_apt_proxy | default('') | length == 0

- name: Add Smallstep APT repository (via Nexus proxy)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/smallstep.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: {{ nexus_apt_proxy }}/repository/apt-proxy-smallstep/
      Suites: debs
      Components: main
      Signed-By: /etc/apt/keyrings/smallstep.asc
  when: nexus_apt_proxy | default('') | length > 0

- name: Install step-cli on all PKI hosts
  ansible.builtin.apt:
    name: step-cli
    state: present
    update_cache: true

- name: Install step-ca on issuing CA only
  ansible.builtin.apt:
    name: step-ca
    state: present
  when: inventory_hostname in groups['pki_issuing_ca']
  notify: Run setcap on step-ca

- name: Create step group
  ansible.builtin.group:
    name: "{{ step_ca_group }}"
    system: true
    state: present

- name: Create step user
  ansible.builtin.user:
    name: "{{ step_ca_user }}"
    group: "{{ step_ca_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ step_ca_home }}"
    create_home: false
    state: present

- name: Create step-ca home directory
  ansible.builtin.file:
    path: "{{ step_ca_home }}"
    state: directory
    owner: "{{ step_ca_user }}"
    group: "{{ step_ca_group }}"
    mode: "0750"

- name: Create step-ca sub-directories
  ansible.builtin.file:
    path: "{{ step_ca_home }}/{{ item }}"
    state: directory
    owner: "{{ step_ca_user }}"
    group: "{{ step_ca_group }}"
    mode: "0750"
  loop:
    - certs
    - config
    - secrets
    - db
