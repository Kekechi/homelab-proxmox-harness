---
# step_ca_common — install step-cli and step-ca binaries and create system user
# Applied to both the Root CA VM and the Issuing CA LXC.

- name: Create step group
  ansible.builtin.group:
    name: "{{ step_ca_common_group }}"
    system: true
    state: present

- name: Create step user
  ansible.builtin.user:
    name: "{{ step_ca_common_user }}"
    group: "{{ step_ca_common_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: "{{ step_ca_common_home }}"
    create_home: false
    state: present

- name: Create step-ca home directory
  ansible.builtin.file:
    path: "{{ step_ca_common_home }}"
    state: directory
    owner: "{{ step_ca_common_user }}"
    group: "{{ step_ca_common_group }}"
    mode: "0750"

- name: Create step-ca sub-directories
  ansible.builtin.file:
    path: "{{ step_ca_common_home }}/{{ item }}"
    state: directory
    owner: "{{ step_ca_common_user }}"
    group: "{{ step_ca_common_group }}"
    mode: "0750"
  loop:
    - certs
    - secrets
    - config
    - db

# ---------------------------------------------------------------------------
# step-cli
# Download URL: https://github.com/smallstep/cli/releases/download/v<version>/
#               step_linux_<version>_amd64.tar.gz
#
# OPERATOR ACTION: Set the correct SHA256 checksum for the chosen version.
# Obtain it from the release page:
#   https://github.com/smallstep/cli/releases/download/v{{ step_ca_common_cli_version }}/
#   step_linux_{{ step_ca_common_cli_version }}_amd64.tar.gz.sha256
# Then set  step_ca_common_cli_checksum  in group_vars or as an extra var.
# Example: step_ca_common_cli_checksum: "sha256:abcdef1234..."
# ---------------------------------------------------------------------------
- name: Download step-cli archive
  ansible.builtin.get_url:
    url: "https://github.com/smallstep/cli/releases/download/v{{ step_ca_common_cli_version }}/step_linux_{{ step_ca_common_cli_version }}_amd64.tar.gz"
    dest: "/tmp/step-cli-{{ step_ca_common_cli_version }}.tar.gz"
    mode: "0644"
    # checksum: "{{ step_ca_common_cli_checksum | default(omit) }}"
    # Uncomment the line above and set step_ca_common_cli_checksum once you have verified
    # the SHA256 from the release page. Leaving it commented skips verification.

- name: Extract step-cli binary
  ansible.builtin.unarchive:
    src: "/tmp/step-cli-{{ step_ca_common_cli_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/step_{{ step_ca_common_cli_version }}/bin/step"

- name: Install step-cli to {{ step_ca_common_cli_install_path }}
  ansible.builtin.copy:
    src: "/tmp/step_{{ step_ca_common_cli_version }}/bin/step"
    dest: "{{ step_ca_common_cli_install_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true

# ---------------------------------------------------------------------------
# step-ca
# Download URL: https://github.com/smallstep/certificates/releases/download/v<version>/
#               step-ca_linux_<version>_amd64.tar.gz
#
# OPERATOR ACTION: Set step_ca_common_checksum similarly to step_ca_common_cli_checksum above.
# ---------------------------------------------------------------------------
- name: Download step-ca archive
  ansible.builtin.get_url:
    url: "https://github.com/smallstep/certificates/releases/download/v{{ step_ca_common_version }}/step-ca_linux_{{ step_ca_common_version }}_amd64.tar.gz"
    dest: "/tmp/step-ca-{{ step_ca_common_version }}.tar.gz"
    mode: "0644"
    # checksum: "{{ step_ca_common_checksum | default(omit) }}"

- name: Extract step-ca binary
  ansible.builtin.unarchive:
    src: "/tmp/step-ca-{{ step_ca_common_version }}.tar.gz"
    dest: /tmp
    remote_src: true
    creates: "/tmp/step-ca_{{ step_ca_common_version }}/bin/step-ca"

- name: Install step-ca to {{ step_ca_common_install_path }}
  ansible.builtin.copy:
    src: "/tmp/step-ca_{{ step_ca_common_version }}/bin/step-ca"
    dest: "{{ step_ca_common_install_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true

- name: Clean up temporary archives
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/step-cli-{{ step_ca_common_cli_version }}.tar.gz"
    - "/tmp/step-ca-{{ step_ca_common_version }}.tar.gz"
