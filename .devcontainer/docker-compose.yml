version: "3.8"

# =============================================================================
# Dev Container Compose — Homelab Proxmox Harness
#
# Architecture:
#   workspace   — dev container (internal:true network only, no direct internet)
#   squid-proxy — dual-homed: internal + external, enforces outbound ACL
#
# The workspace container CANNOT reach the internet or LAN directly.
# ALL outbound HTTP/HTTPS traffic must go through squid-proxy:3128.
# Ansible SSH to sandbox VMs is tunneled through Squid CONNECT on port 22.
#
# To update network policy (allowed CIDRs / domains):
#   1. Edit .devcontainer/squid/allowed-cidrs.conf or squid.conf
#   2. Run: docker compose build squid-proxy
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Squid Forward Proxy
  # Dual-homed: shares 'isolated' network with workspace, has 'external' access.
  # Config is baked into the image — not mounted from workspace.
  # ---------------------------------------------------------------------------
  squid-proxy:
    build:
      context: ./squid
      dockerfile: Dockerfile.squid
    restart: unless-stopped
    networks:
      - isolated
      - external
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
    healthcheck:
      test: ["CMD-SHELL", "squid -k check 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Dev Container / Workspace
  # ONLY on 'isolated' (internal:true) network — zero direct internet access.
  # All external traffic routed through squid-proxy.
  # ---------------------------------------------------------------------------
  workspace:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Workspace mount
      - ..:/workspace:cached
      # Persist Terraform provider cache across rebuilds
      - terraform-plugin-cache:/home/vscode/.terraform.d/plugin-cache
      # Host ~/.claude mount — persists Claude Code session, memory, and settings
      # across container rebuilds without re-authentication
      - ~/.claude:/home/vscode/.claude:cached
      - ~/.claude.json:/home/vscode/.claude.json:cached
    environment:
      # Proxy — ALL HTTP/HTTPS goes through Squid
      - http_proxy=http://squid-proxy:3128
      - https_proxy=http://squid-proxy:3128
      - HTTP_PROXY=http://squid-proxy:3128
      - HTTPS_PROXY=http://squid-proxy:3128
      # no_proxy intentionally does NOT include MinIO IP:
      # MinIO is on the LAN and the workspace has no direct LAN access.
      # MinIO traffic must go through Squid (which allows the MinIO CIDR).
      - no_proxy=localhost,127.0.0.1
      # Terraform provider cache
      - TF_PLUGIN_CACHE_DIR=/home/vscode/.terraform.d/plugin-cache
      # Claude Code config directory (matches the volume mount above)
      - CLAUDE_CONFIG_DIR=/home/vscode/.claude
    depends_on:
      squid-proxy:
        condition: service_healthy
    networks:
      - isolated
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL    
    command: sleep infinity
    user: vscode

networks:
  # isolated: devcontainer lives here — internal:true means no direct egress
  isolated:
    driver: bridge
    internal: true

  # external: squid uses this to reach the internet and LAN
  external:
    driver: bridge

volumes:
  terraform-plugin-cache:
