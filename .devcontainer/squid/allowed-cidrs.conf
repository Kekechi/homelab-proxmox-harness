# =============================================================================
# Squid Allowed CIDRs
#
# One CIDR or IP per line. Comments (#) and blank lines are ignored.
# These are baked into the Squid Docker image at build time.
#
# INSTRUCTIONS:
#   1. Replace the placeholder values below with your actual network addresses
#   2. Run: docker compose build squid-proxy
#   3. Reopen the dev container
#
# Typical entries:
#   - Your sandbox Proxmox VLAN subnet (Claude can reach the API + VMs here)
#   - Your MinIO LXC IP (Terraform state backend)
#
# DO NOT add production Proxmox IPs here.
# =============================================================================

# Sandbox Proxmox VLAN subnet
# Replace with your actual sandbox VLAN CIDR (e.g. 192.168.20.0/24)
192.168.SANDBOX.0/24

# MinIO LXC IP
# Replace with your actual MinIO LXC IP address
192.168.MINIO.X/32
