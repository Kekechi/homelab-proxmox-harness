# =============================================================================
# Squid Forward Proxy — Homelab Proxmox Harness
#
# Purpose: Restrict devcontainer outbound access to only the destinations
# required for Terraform + Ansible workflows against the sandbox environment.
#
# To change allowed destinations:
#   1. Edit allowed-cidrs.conf (for LAN CIDRs)
#   2. Edit this file (for domains)
#   3. Run: docker compose build squid-proxy
# =============================================================================

http_port 3128

# Cache settings — helps with repeated terraform init provider downloads
cache_mem 256 MB
maximum_object_size 512 MB
cache_dir ufs /var/spool/squid 1000 16 256

# Logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# ---------------------------------------------------------------------------
# Port ACLs
#
# Port 22   — Ansible SSH via CONNECT tunnel to sandbox VMs
# Port 80   — HTTP (MinIO if not using TLS, package repos)
# Port 443  — HTTPS (Terraform registry, GitHub releases)
# Port 8006 — Proxmox API
# Port 9000 — MinIO S3 API
# ---------------------------------------------------------------------------
acl Safe_ports port 22 80 443 8006 9000
acl SSL_ports  port 22 443 8006 9000
acl CONNECT    method CONNECT

# ---------------------------------------------------------------------------
# Allowed domains (exact matches — no wildcards)
#
# registry.terraform.io         — Terraform provider version resolution
# releases.hashicorp.com        — HashiCorp provider binary downloads
# github.com                    — bpg/proxmox provider releases
# objects.githubusercontent.com — GitHub release asset CDN
# api.anthropic.com             — Claude API endpoints
# claude.ai                     — authentication for claude.ai accounts
# platform.claude.com           — authentication for Anthropic Console accounts
# statsig.anthropic.com         — Claude Code feature flags
# statsig.com                   — Claude Code feature flags
#
# NOT included: *.github.com, *.hashicorp.com, *.terraform.io
# ---------------------------------------------------------------------------
acl allowed_domains dstdomain registry.npmjs.org
acl allowed_domains dstdomain registry.terraform.io
acl allowed_domains dstdomain releases.hashicorp.com
acl allowed_domains dstdomain github.com
acl allowed_domains dstdomain objects.githubusercontent.com
acl allowed_domains dstdomain api.anthropic.com
acl allowed_domains dstdomain claude.ai
acl allowed_domains dstdomain platform.claude.com
acl allowed_domains dstdomain statsig.anthropic.com
acl allowed_domains dstdomain statsig.com

# ---------------------------------------------------------------------------
# Allowed CIDRs — baked in from allowed-cidrs.conf
# Covers: sandbox Proxmox VLAN, MinIO LXC IP
# ---------------------------------------------------------------------------
acl allowed_cidrs dst "/etc/squid/allowed-cidrs.conf"

# ---------------------------------------------------------------------------
# Access rules (order matters — first match wins)
# ---------------------------------------------------------------------------

# Deny non-standard ports
http_access deny !Safe_ports

# Deny CONNECT to non-SSL ports
http_access deny CONNECT !SSL_ports

# Allow whitelisted domains and CIDRs
http_access allow allowed_domains
http_access allow allowed_cidrs

# Cache manager — localhost only (squid container itself, not workspace)
http_access allow localhost manager
http_access deny manager

# Local overrides — personal additions (e.g. MCP servers)
include /etc/squid/squid.conf.local

# Deny everything else
http_access deny all
